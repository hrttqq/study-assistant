server:
  port: 8080

spring:
  application:
    name: study-gateway
  cloud:
    gateway:
      routes:
        - id: study-auth
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
        - id: study-user
          uri: http://localhost:8082
          predicates:
            - Path=/users/**
        - id: study-ai
          uri: http://localhost:8083
          predicates:
            - Path=/ai/**
        - id: study-plan
          uri: http://localhost:8084
          predicates:
            - Path=/plans/**,/tasks/**,/checkins/**
        - id: study-file
          uri: http://localhost:8085
          predicates:
            - Path=/files/**
        - id: study-notification
          uri: http://localhost:8086
          predicates:
            - Path=/notifications/**
        - id: study-member
          uri: http://localhost:8087
          predicates:
            - Path=/memberships/**
        - id: study-wx
          uri: http://localhost:8088
          predicates:
            - Path=/wx/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
